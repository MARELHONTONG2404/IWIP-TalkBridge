name: ilb
description: "ILB (Intelligent Language Bridge) - Smart Real-Time Conversation Translator"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.0.0

  # Local Storage
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  isar_community: 3.3.2
  isar_community_flutter_libs: 3.3.2

  # Speech Recognition
  speech_to_text: ^7.4.0
  # Networking
  flutter_tts: ^4.0.2
  http: ^1.2.2

  # Camera & OCR
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.1

  # Offline Translation
  google_mlkit_translation: ^0.11.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  package_info_plus: ^8.1.0
  camera: ^0.12.0+2
  permission_handler: ^12.0.3
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  isar_community_generator: 3.3.2
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/iwip_logo_v2.jpg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/iwip_logo_v2.jpg"

