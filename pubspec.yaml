name: ilb
description: "ILB (Intelligent Language Bridge) - Smart Real-Time Conversation Translator"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.0.0

  # Local Storage
  shared_preferences: ^2.5.3

  # Speech Recognition
  speech_to_text: ^7.4.0
  # Networking
  flutter_tts: ^4.0.2
  http: ^1.2.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/